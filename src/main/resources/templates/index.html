<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Product Application</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

	<div class="bg-white shadow-lg rounded-2xl p-8 w-full max-w-md">

		<!-- Header -->
		<div class="flex justify-between items-center mb-6">
			<h2 class="text-2xl font-bold text-gray-700">Add Product</h2>
			<a th:href="@{/view}"
				class="text-blue-500 hover:text-blue-700 text-sm font-medium">
				View Products </a>
		</div>

		<!-- Form -->
		<form th:action="@{/save}" th:object="${products}" method="post"
			class="space-y-4">

			<input type="hidden" th:field="*{productId}" />

			<!-- Name -->
			<div>
				<label class="block text-gray-600 text-sm mb-1">Product Name</label>
				<input type="text" th:field="*{productName}"
					class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400">
			</div>
			<div>
				<p th:if="${#fields.hasErrors('productName')}"
					th:errors="*{productName}"  class="text-red-500 text-sm mt-1">></p>
			</div>

			<!-- Price -->
			<div>
				<label class="block text-gray-600 text-sm mb-1">Product
					Price</label> <input type="number" th:field="*{productPrice}"
					class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400">
			</div>
			<div>
				<p th:if="${#fields.hasErrors('productPrice')}"
					th:errors="*{productPrice}"  class="text-red-500 text-sm mt-1">></p>
			</div>

			<!-- Quantity -->
			<div>
				<label class="block text-gray-600 text-sm mb-1">Product
					Quantity</label> <input type="number" th:field="*{productQuantity}"
					class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400">
			</div>
			<div>
				<p th:if="${#fields.hasErrors('productQuantity')}"
					th:errors="*{productQuantity}"  class="text-red-500 text-sm mt-1">></p>
			</div>

			<!-- Button -->
			<button type="submit"
				class="w-full bg-blue-500 text-white py-2 rounded-lg hover:bg-blue-600 transition duration-200">
				Save Product</button>

		</form>

	</div>

</body>
</html>
