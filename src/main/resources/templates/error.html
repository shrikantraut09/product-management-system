<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Error</title>

<!-- Tailwind CDN -->
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

	<div
		class="bg-white shadow-xl rounded-2xl p-8 max-w-md w-full text-center">

		<!-- Error Icon -->
		<div class="text-red-500 text-5xl mb-4">⚠️</div>

		<!-- Title -->
		<h2 class="text-2xl font-bold text-gray-800 mb-2">Something went
			wrong</h2>

		<!-- Error Message -->
		<p th:text="${errorMessage}" class="text-red-500 text-sm mb-6"></p>

		<!-- Back Button -->
		<a th:href="@{/}"
			class="inline-block bg-blue-500 hover:bg-blue-600 text-white px-5 py-2 rounded-lg shadow transition duration-200">
			Go Back </a>

	</div>

</body>
</html>
